<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>공통 모달 컴포넌트</title>

    <!-- 공통 모달 CSS 연결 -->
    <link rel="stylesheet" href="./modal.css" />
</head>

<body>
    <div class="page">
        <h1 class="page-title">강사 전체 조회 - 승인 여부 확인</h1>
        <p class="page-description">
            공통 컴포넌트 방식의 모달 예시입니다.
        </p>

        <div class="button-group">
            <!-- 투버튼 모달 실행 버튼 -->
            <button class="open-modal-btn" data-modal-type="confirm" data-modal-title="승인하시겠습니까?"
                data-modal-text="승인 완료되면 해당 강사의 활동이 가능합니다." data-confirm-url="./approve-complete.html">
                투버튼 모달 열기
            </button>

            <!-- 원버튼 모달 실행 버튼 -->
            <button class="open-modal-btn" data-modal-type="alert" data-modal-title="승인이 완료되었습니다."
                data-modal-text="확인 버튼을 누르면 지정한 페이지로 이동합니다." data-confirm-url="./list.html">
                원버튼 모달 열기
            </button>
        </div>
    </div>

    <!-- 
    공통 모달 컴포넌트
    - hidden 클래스가 붙어 있으면 화면에서 숨김
    - JS에서 data 속성을 바꿔가며 재사용
  -->
    <div class="modal hidden" id="commonModal" aria-hidden="true">
        <!-- 
      뒷배경(오버레이)
      - 투버튼 모달에서는 클릭 시 닫힘
      - 원버튼 모달에서는 클릭해도 닫히지 않도록 JS에서 제어
    -->
        <div class="modal-overlay" data-role="overlay"></div>

        <!-- 
      모달 박스
      role="dialog" : 보조기기에서 대화상자라고 인식
      aria-modal="true" : 모달임을 의미
    -->
        <div class="modal-container" role="dialog" aria-modal="true" aria-labelledby="modalTitle"
            aria-describedby="modalDescription">

            <!-- 모달 본문 영역 -->
            <div class="modal-content">
                <h2 class="modal-title" id="modalTitle">기본 제목</h2>
                <p class="modal-description" id="modalDescription">기본 설명 문구입니다.</p>
            </div>

            <!-- 
        버튼 영역
        - 투버튼/원버튼 모드에 따라 버튼 노출이 달라짐
      -->
            <div class="modal-footer">
                <button type="button" class="modal-btn cancel-btn" data-role="cancel">
                    취소
                </button>
                <button type="button" class="modal-btn confirm-btn" data-role="confirm">
                    확인
                </button>
            </div>
        </div>
    </div>

    <!-- 공통 모달 JS 연결 -->
    <script src="./modal.js"></script>
</body>

</html>

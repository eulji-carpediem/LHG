<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {box-sizing: border-box;}
        body {
            margin: 50px auto;
            padding: 20px;
        }
        .box {
            margin-top: 10px;
            width: 400px;
            height: 60px;
            line-height: 60px;
            padding-left: 20px;
            border: 1px solid gray;
            border-radius: 4px;
        }
        #text {
        }
        button {
            margin: 5px;
            padding-left: 10px;
            padding-right: 10px;
            height: 40px;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="box" id="box1">첫 번째 박스입니다.</div>
    <div class="box" id="box2">두 번째 박스입니다.</div>
    <p id="text">여기에 메시지가 표시됩니다.</p>
    <button onclick="firstBoxChange();">첫 번째 박스 선택</button>
    <button onclick="secondBoxChange();">두 번째 박스 선택</button>
    <button onclick="textChange();">메시지 선택</button>

    <script>
        function firstBoxChange() {
            const $box1 = document.getElementById('box1');
            $box1.style.backgroundColor = '#ffcccc';
            $box1.innerText = "첫 번째 박스를 찾았습니다.";
        }
        function secondBoxChange() {
            const $box1 = document.getElementById('box2');
            $box1.style.backgroundColor = '#ccffcc';
            $box1.innerText = "두 번째 박스를 찾았습니다.";
        }
        function textChange() {
            const $text = document.getElementById('text');
            $text.innerText = "ID로 요소를 성공적으로 찾았습니다";
            $text.style.color = "#007bff";
            $text.style.fontSize = "18px";
            $text.style.fontWeight = "bold";
        }
    </script>
</body>
</html>

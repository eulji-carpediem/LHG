<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {box-sizing: border-box;}
        body {margin: 0;}
        .box {
            width: 400px;
            height: 60px;
            margin: 20px;
            padding-left: 20px;
            border: 1px solid gray;
            border-radius: 4px;
            line-height: 60px;
        }
        .button {
            width: auto;
            height: 40px;
            margin-left: 20px;
            padding: 10px;
            background-color: dodgerblue;
            color: white;
            border: 0px;
            font-size: 14px;
            border-radius: 2px;
            cursor: pointer;
        }
        .text {
            margin-left: 20px;
        }
        .button:hover {
            background-color: rgb(20, 90, 160);
        }
    </style>
</head>
<body>
    <div class="box" id="box1">첫 번째 박스입니다.</div>
    <div class="box " id="box2">두 번째 박스입니다.</div>
    <p class="text" id="text">여기에 메세지가 표시됩니다.</p>
    <button onclick="changeBox1()" class="button" id="button1">첫 번째 박스 선택</button>
    <button onclick="changeBox2()" class="button" id="button1">두 번쨰 박스 선택</button>
    <button onclick="changeBox1()" class="button" id="button1">메세지 선택</button>

</body>

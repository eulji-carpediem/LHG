<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        box-sizing: border-box;
    }
    .container {
        width: 250px;
        height: 225px;
        margin: 16px;
        background: #FFFFFF;
        display: flex;
        flex-wrap: wrap;
    }

    .box {
        width: 250px;
        height: 150px;
        background-color: #FFB9B9;
        border-radius: 8px 8px 0 0;
    }
    .content {
        width: 250px;
        height: 75px;
        display: flex;
        flex-wrap: wrap;
        border: 1px solid #FFB9B9;
    }
    .text1 {
        width: 250px;
        height: 20px;
        font-family: Inter;
        font-weight: 400;
        font-size: 12px;
        padding-left: 6px;
    }
    .circle {
        width: 24px;
        height: 24px;
        background: #D9D9D9;
        border-radius: 999px;
    }
    .text2 {
        width: 50px;
        height: 15px;
        font-weight: 400;
        font-size: 12px;
        padding-left: 6px;
        margin-top: 2px;
    }
</style>

<body>
    <div class="container">
        <div class="box"></div>
        <div class="content">
            <div class="text1">안녕하세요. 텍스트입니다.</div>
        <div class="circle"></div>
        <div class="text2">휴양죠</div>
        </div>
    </div>
</body>
</html>

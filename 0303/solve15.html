<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {box-sizing: border-box;}
    .text1 {
        width: 100px;
        height: 29px;
        margin: 16px;
        font-size: 24px;
        font-weight: 700;
    }
    .id-container {
        width: 278px;
        height: 67px;
        margin-left: 16px;
        margin-top: 32px;
        gap: 8px;
        display: flex;
        flex-wrap: wrap;
    }
    .pw-container {
        width: 278px;
        height: 67px;
        margin-left: 16px;
        margin-top: 32px;
        gap: 8px;
        display: flex;
        flex-wrap: wrap;
    }
    .box {
        width: 278px;
        height: 40px;
        border-radius: 8px;
        border: 1px solid black;
    }
    .login {
        width: 278px;
        height: 48px;
        margin-left: 16px;
        margin-top: 32px;
        border-radius: 8px;
        background: #17B75E;
        font-size: 20px;
        font-weight: 700;
        color: white;
        align-content: center;
        text-align: center;
    }
</style>
<body>
    <div class="text1">로그인</div>
    <div class="id-container">
        <div class="id">아이디</div>
        <div class="box"></div>
    </div>
    <div class="pw-container">
        <div class="pw">비밀번호</div>
        <div class="box"></div>
    </div>
    <div class="login">로그인</div>
</body>
</html>

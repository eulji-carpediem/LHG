<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        box-sizing: border-box;
    }

    .box {
        width: 160px;
        height: 160px;
        margin: 16px;
        background: #CA785C;
        border-radius: 9999px;
    }

    .text {
        width: 160px;
        height: 19px;
        margin: 16px;
        font-family: Inter;
        font-weight: 700;
        font-size: 16px;
        text-align: center;
    }
</style>

<body>
    <div class="box"></div>
    <div class="text">프로필</div>
</body>

</html>

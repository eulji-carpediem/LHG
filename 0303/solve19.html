<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {box-sizing: border-box;}
    .box {
        width: 297px;
        height: 35px;
        margin: 16px;
        background: #FFB9B9;
        display: flex;
        gap: 16px;
        justify-content: space-evenly;
        align-items: center;
        padding: 8px 16px 8px 16px;
    }
    .text {
        width: 45px;
        height: 25px;
        font-size: 16px;
        font-weight: 700;
        color: white;
    }
    .text1 {
        width: 74px;
        height: 25px;
        font-size: 16px;
        font-weight: 700;
        color: white;
    }
    .circle {
        width: 4px;
        height: 4px;
        background: #D9D9D9;
    }
</style>
<body>
    <div class="box">
        <div class="text">웹툰홈</div>
        <div class="circle"></div>
        <div class="text1">요일별웹툰</div>
        <div class="circle"></div>
        <div class="text1">베스트도전</div>
    </div>
</body>
</html>

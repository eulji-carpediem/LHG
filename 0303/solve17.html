<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {box-sizing: border-box;}
    .container {
        width: 300px;
        height: 250px;
        margin: 16px;
        background-image: url("assets/images/image4.jpg");
        background-size: cover;
        background-position: center;
        display: flex;
        flex-wrap: wrap;
        border-radius: 8px;
        justify-content: end;
        align-content: space-between;
    }
    .circle {
        width: 24px;
        height: 24px;
        border-radius: 999px;
        margin: 16px;
        background: #D9D9D9;
    }
    .content {
        width: 300px;
        height: 56px;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        flex-wrap: wrap;
        border-radius: 0 0 8px 8px;
    }
    .text1 {
        width: 300px;
        height: 28px;
        font-size: 12px;
        font-weight: 700;
        color: white;
        padding-left: 8px;
        padding-top: 8px;
    }
    .text2 {
        width: 300px;
        height: 28px;
        font-size: 12px;
        font-weight: 700;
        color: rgba(209, 209, 209, 1);
        padding-left: 8px;
        padding-bottom: 8px;
        padding-top: 4px;
    }
</style>
<body>
    <div class="container">
        <div class="circle"></div>
        <div class="content">
            <div class="text1">새로운 시작!</div>
            <div class="text2">김작가</div>
        </div>
    </div>
</body>
</html>

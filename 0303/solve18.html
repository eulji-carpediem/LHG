<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {box-sizing: border-box;}
    .container {
        width: 332px;
        height: 100px;
        margin: 16px;
        background: #FFE4E4;
        border-radius: 0 8px 8px 0;
        display: flex;
    }
    .side {
        width: 160px;
        height: 100px;
        background: #FFB9B9;
        border-radius: 8px;
    }
    .content {
        width: 172px;
        height: 100px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 8px;
        align-content: center;
    }
    .box {
        width: 96px;
        height: 19px;
        background-color: #FFB9B9;
        border-radius: 2px;
        font-size: 12px;
        font-weight: 400;
        color: white;
        text-align: center;
    }
    .text1 {
        width: 123px;
        height: 19px;
        font-size: 16px;
        font-weight: 400;
    }
    .text2 {
        width: 113px;
        height: 17px;
        font-size: 14px;
        font-weight: 400;
        color: #8B8B8B;
    }
</style>
<body>
    <div class="container">
        <div class="side"></div>
        <div class="content">
            <div class="box">반가워요!</div>
            <div class="text1">좋은하루보내세요!</div>
            <div class="text2">날씨가 좋네요!</div>
        </div>
    </div>
</body>
</html>

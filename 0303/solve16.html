<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        box-sizing: border-box;
    }
    .container {
        width: 336px;
        height: 148px;
        margin: 16;
        border-radius: 8px;
        border: 1px solid #C2C2C2;
        display: flex;
        flex-wrap: wrap;
        justify-content: space-evenly;
        align-content: center;
        gap: 8px;
    }
    .text1 {
        width: 336px;
        height: 20px;
        font-size: 16px;
        font-weight: 400;
        text-align: center;
    }

    .login {
        width: 278px;
        height: 48px;
        border-radius: 8px;
        background: #17B75E;
        font-size: 20px;
        font-weight: 700;
        color: white;
        align-content: center;
        text-align: center;
    }
    .text2 {
        width: 336px;
        height: 20px;
        font-size: 14px;
        font-weight: 400;
        text-align: center;
    }
    pre {
        display: inline;
        color: #D3D5D7;
    }
</style>

<body>
    <div class="container">
        <div class="text1">사이트를 더 안전하게 편리하게 이용하세요.</div>
        <div class="login">로그인</div>
        <div class="text2">아이디 찾기 <pre>|</pre> 비밀번호 찾기 <pre>|</pre> 회원가입</div>
    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        box-sizing: border-box;
    }
    .container {
        width: 160px;
        height: 240px;
        margin: 16px;
        border-radius: 4px;
        background: #CA785C;
        display: flex;
        flex-wrap: wrap;
    }

    .box {
        width: 160px;
        height: 172px;
        background-image: url("assets/images/image2.jpg");
        background-position: 55% 55%;
        border-radius: 4px 4px 0 0;
    }

    .text1 {
        width: 160px;
        height: 20px;
        font-family: Inter;
        font-weight: 700;
        font-size: 16px;
        color: white;
        align-content: center;
        padding-left: 6px;
    }
    .text2 {
        width: 60px;
        height: 17px;
        font-family: Inter;
        font-weight: 700;
        font-size: 14px;
        color: white;
        padding-left: 6px;
    }
    .text3 {
        width: 100px;
        height: 17px;
        font-family: Inter;
        font-weight: 700;
        font-size: 14px;
        color: white;
        padding-left: 6px;
        text-align: end;
    }
</style>

<body>
    <div class="container">
        <div class="box"></div>
        <div class="text1">인테리어란?</div>
        <div class="text2">김작가</div>
        <div class="text2">2024.01.01</div>
    </div>
</body>
</html>

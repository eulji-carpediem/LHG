<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        box-sizing: border-box;
    }
    .container {
        width: 278px;
        height: 160px;
        margin: 16px;
        border-radius: 8px;
        background: #CA785C;
    }

    .box {
        width: 278px;
        height: 120px;
        background-image: url("assets/images/image1.jpg");
        background-position: center;
        background-size: cover;
        border-radius: 8px 8px 0 0;
    }

    .text {
        width: 278px;
        height: 40px;
        font-family: Inter;
        font-weight: 700;
        font-size: 16px;
        color: white;
        align-content: center;
        padding-left: 16px;
    }
</style>

<body>
    <div class="container">
        <div class="box"></div>
        <div class="text">안녕하세요!</div>
    </div>
</body>
</html>

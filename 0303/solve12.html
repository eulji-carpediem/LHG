<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {box-sizing: border-box;}
    .box {
        width: 320px;
        height: 320px;
        margin: 16px;
        background-image: url("assets/images/image3.jpg");
        background-position: 50% 60%;
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-content: space-between;
    }
    .text {
        width: 161px;
        height: 29px;
        margin: 16px;
        font-size: 24px;
        color: white;
        font-weight: 700;
    }
    .circle {
        width: 32px;
        height: 32px;
        border-radius: 999px;
        margin: 16px;
    }
    .circle1 {
        background: #E3FF92;
    }
    .circle2 {
        background: #92F8FF;
    }
    .circle3 {
        background: #FF9292;
    }
</style>
<body>
    <div class="box">
        <div class="text">인테리어 디자인</div>
        <div class="circle circle1"></div>
        <div class="circle circle2"></div>
        <div class="circle circle3"></div>
    </div>
</body>
</html>

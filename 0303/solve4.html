<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        box-sizing: border-box;
    }

    .box {
        width: 278px;
        height: 160px;
        margin: 16px;
        background: #CA785C;
        border-radius: 8px;
    }

    .text {
        width: 100px;
        height: 19px;
        margin: 16px;
        font-weight: 600;
        font-size: 16px;
    }
</style>

<body>
    <div class="box"></div>
    <div class="text">안녕하세요!</div>
</body>

</html>

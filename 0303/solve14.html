<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        box-sizing: border-box;
    }

    .box {
        width: 120px;
        height: 170px;
        margin: 16px;
        background: #FFB9B9;
        border-radius: 8px;
        display: flex;
        flex-wrap: wrap;
        justify-content: end;
        align-content: end;
    }

    .text {
        width: 104px;
        height: 30px;
        margin-left: 24px;
        font-weight: 400;
        font-size: 12px;
    }
    .circle {
        width: 24px;
        height: 24px;
        border-radius: 999px;
        background: #D9D9D9;
        margin: 8px;
    }
</style>

<body>
    <div class="box">
        <div class="circle"></div>
    </div>
    <div class="text">나른한 점심시간, 밖에서 밥먹기</div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            display: grid;
            height: 100vh;
            margin: 0;
        }

        .header,
        .footer {
            width: 100%;
            height: 60px;
            background: #36393c;
            color: white;
            align-items: center;
            padding-left: 10px;
        }

        .container {
            display: grid;
            height: 100vh;
            grid-template-columns: 200px auto 200px;
            grid-template-rows: 60px auto 60px;
            grid-template-areas:
                "a a a"
                "b c d"
                "e e e";
                gap: 10px;
        }

        .main {
            padding: 30px;
            border: 1px solid gray;
        }

        .box {
            border: 1px dashed #adc6ff;
            background-color: #f0f5ff;
            padding: 15px;
            margin: 20px 0 20px 0;
        }

        .nav {
            width: 200px;
            border: 1px solid gray;
            background: #f0f4f8;
        }

        .aside {
            width: 200px;
            border: 1px solid gray;
            background: #f0f4f8;
        }

        .nav1,
        .aside1 {
            padding: 10px;
        }

        pre {
            display: inline-block;
        }

        @media(max-width : 768px) {
            .container {
                height: 100vh;
                grid-template-columns: 1fr;
                grid-template-rows: 60px 1fr 1.5fr 1fr 60px;
                grid-template-areas:
                "a a a"
                "b b b"
                "c c c"
                "d d d"
                "e e e"
                ;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header" style="grid-area: a;"><p>머리부(Header)</p></div>
        <nav class="nav " style="grid-area: b;">
            <h3 class="nav1">네비게이션(Nav)</h3>
            <ul class="nav3">
                <li>Home</li>
                <li>About</li>
                <li>Contact</li>
            </ul>
        </nav>
        <main class="main" style="grid-area: c;">
            <h1>메인 콘텐츠(Main)</h1>
            <div class="box">양옆은 고정폭, 가운데는 가변폭!</div>
            <div class="center">Hint. 가운데 영역은
                <pre>flex: 1</pre>로 남는 공간을 차지합니다.
            </div>
        </main>
        <aside class="aside" style="grid-area: d;">
            <h3 class="aside1">사이드바(Aside)</h3>
            <p class="aside1">공지/광고/프로필 등</p>
        </aside>
        <div class="footer" style="grid-area: e;"><p>바닥부(Footer)</p></div>
    </div>
</body>

</html>
